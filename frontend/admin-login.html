<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | VulnLab</title>

<link rel="stylesheet" href="css/style.css">

<style>
.admin-login-page {
    min-height: calc(100vh - 80px);
    display: grid;
    place-items: center;
    padding: 60px 20px;
    position: relative;
    overflow: hidden;
}

.admin-login-page::before {
    content: "";
    position: absolute;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(168,85,247,0.26), transparent 65%);
    top: -180px;
    right: -130px;
}

.admin-login-page::after {
    content: "";
    position: absolute;
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, rgba(56,189,248,0.22), transparent 65%);
    bottom: -160px;
    left: -120px;
}

.admin-login-card {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 2;
    padding: 38px;
    border-radius: 30px;
    background:
        linear-gradient(135deg, rgba(168,85,247,0.18), transparent 42%),
        linear-gradient(220deg, rgba(56,189,248,0.12), transparent 45%),
        rgba(15,23,42,0.88);
    border: 1px solid rgba(168,85,247,0.36);
    box-shadow: 0 30px 90px rgba(0,0,0,0.55);
    backdrop-filter: blur(14px);
}

.admin-login-icon {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    display: grid;
    place-items: center;
    margin-bottom: 22px;
    font-size: 2rem;
    background: rgba(168,85,247,0.16);
    border: 1px solid rgba(168,85,247,0.42);
    box-shadow: 0 0 35px rgba(168,85,247,0.25);
}

.admin-login-card h1 {
    font-size: 2.4rem;
    margin-bottom: 10px;
}

.admin-login-card h1 span {
    color: #a855f7;
}

.admin-login-card p {
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 24px;
}

.admin-security-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
}

.admin-security-strip span {
    padding: 8px 12px;
    border-radius: 999px;
    color: #c084fc;
    background: rgba(168,85,247,0.12);
    border: 1px solid rgba(168,85,247,0.32);
    font-size: 0.78rem;
    font-weight: 800;
}

.admin-auth-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.admin-auth-form input {
    padding: 15px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(2,6,23,0.72);
    color: white;
    outline: none;
    font-size: 1rem;
}

.admin-auth-form input:focus {
    border-color: rgba(168,85,247,0.65);
    box-shadow: 0 0 0 4px rgba(168,85,247,0.13);
}

.admin-login-btn {
    margin-top: 6px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #a855f7, #38bdf8);
    color: white;
    font-weight: 900;
    padding: 15px;
    border-radius: 14px;
    transition: 0.3s;
}

.admin-login-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 45px rgba(168,85,247,0.28);
}

.admin-login-footer {
    margin-top: 22px;
    display: flex;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
}

.admin-login-footer a {
    color: #38bdf8;
    font-weight: 700;
}

#adminLoginMessage {
    margin-top: 16px;
    font-weight: 800;
}

.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input {
    width: 100%;
    box-sizing: border-box;
    padding-right: 50px;
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: #94a3b8;
}

.toggle-password:hover {
    color: #a855f7;
}


@media(max-width: 600px) {
    .admin-login-card {
        padding: 28px;
    }

    .admin-login-card h1 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="container navbar-content">
        <div class="logo">
            <span class="logo-glow">V</span>ulnLab
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">User Login</a>
        </div>
    </div>
</nav>

<section class="admin-login-page">

    <div class="admin-login-card">

        <div class="admin-login-icon">
            🛡
        </div>

        <h1>
            Admin <span>Portal</span>
        </h1>

        <p>
            Secure administrator access for managing users, labs, XP, audit logs, analytics, and VulnLab platform controls.
        </p>

        <div class="admin-security-strip">
            <span>RBAC Enabled</span>
            <span>JWT Protected</span>
            <span>Admin Only</span>
        </div>

        <form id="adminLoginForm" class="admin-auth-form">

            <input
                type="email"
                id="adminEmail"
                placeholder="Admin Email"
                required
            >

            <div class="password-wrapper">

    <input
        type="password"
        id="adminPassword"
        placeholder="Admin Password"
        required
    >

    <button
        type="button"
        class="toggle-password"
        onclick="toggleAdminPassword()"
        aria-label="Toggle password visibility"
    >
        👁
    </button>

</div>

            <button type="submit" class="admin-login-btn">
                Access Admin Console
            </button>

        </form>

        <p id="adminLoginMessage"></p>

        <div class="admin-login-footer">
            <a href="login.html">User login</a>
            <a href="index.html">Back to home</a>
        </div>

    </div>

</section>

<script>
function toggleAdminPassword() {

    const passwordInput =
    document.getElementById("adminPassword");

    if (passwordInput.type === "password") {

        passwordInput.type = "text";

    } else {

        passwordInput.type = "password";

    }
}
</script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
