<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | VulnLab</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            box-sizing: border-box;
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #94a3b8;
        }

        .toggle-password:hover {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container navbar-content">
        <div class="logo">
            <span class="logo-glow">V</span>ulnLab
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="admin-login.html">Admin Login</a>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="hero-grid"></div>

    <div class="container hero-content">
        <div class="badge">User Access Portal</div>

        <h1>
            Welcome Back.<br>
            <span>Continue Learning.</span>
        </h1>

        <p style="color:#94a3b8;margin-bottom:25px;">
            Login here as a learner to access labs, profile, progress, and leaderboard.
        </p>

        <form id="loginForm" class="auth-form">

            <input
                type="email"
                id="loginEmail"
                placeholder="User Email"
                required
            >

            <div class="password-wrapper">
                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    onclick="togglePassword()"
                    aria-label="Toggle password visibility"
                >
                    👁
                </button>
            </div>

            <button type="submit" class="btn btn-primary">
                User Login
            </button>

        </form>

        <p id="loginMessage" class="form-message"></p>

        <p>
            Don't have an account?
            <a href="register.html" style="color:#38bdf8;">
                Register here
            </a>
        </p>

        <p style="margin-top:12px;">
            Are you an admin?
            <a href="admin-login.html" style="color:#a855f7;">
                Login from Admin Portal
            </a>
        </p>
    </div>
</section>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("loginPassword");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
