<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | VulnLab</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo"><span class="logo-glow">V</span>ulnLab</div>

            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-grid"></div>

        <div class="container hero-content">
            <div class="badge">Create Your VulnLab Account</div>

            <h1>Start Your <span>Cybersecurity Journey.</span></h1>

            <form id="registerForm" class="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <p id="message" class="form-message"></p>

            <p>
                Already have an account?
                <a href="login.html" style="color:#38bdf8;">Login here</a>
            </p>
        </div>
    </section>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
